name: repair-system

services:
  repair-system-app:
    build: .
    container_name: repair-system-app
    ports:
      - "${HOST_PORT:-8240}:4000"
    environment:
      DATABASE_URL: "${DATABASE_URL:-file:/app/data/repair-system.db}"
      PORT: "${PORT:-4000}"
      CLIENT_ORIGIN: "${CLIENT_ORIGIN:-http://localhost:8240}"
    volumes:
      - repair-system-data:/app/data
      - repair-system-uploads:/app/server/src/uploads
    networks:
      - repair-system-network
    restart: unless-stopped

volumes:
  repair-system-data:
    name: repair-system-data
  repair-system-uploads:
    name: repair-system-uploads

networks:
  repair-system-network:
    name: repair-system-network
